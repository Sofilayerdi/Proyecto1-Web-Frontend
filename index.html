<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Series Tracker</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="body">
    <div id="app">
      <h1>Series Tracker</h1>
      <p> Lleva el registro de tus series</p>
    </div>
    <div class="search">
      <div class="search-row">
        <input type="text" id="buscar" placeholder="Busca una serie" />
      </div>
      <div class="sort-row">
        <span class="sort-label">Ordenar por</span>
        <div class="sort-btns" id="sort-btns">
          <button class="sort-btn active" data-value="id">ID</button>
          <button class="sort-btn" data-value="name">Nombre</button>
        </div>
        <button id="order-toggle" title="Cambiar orden">↑ Asc</button>
      </div>
    </div> 
    
    <div class="content">
      <button id="before"> &lt; </button>
      <div class="lista">
      </div>
      <button id="after"> &gt; </button>
    </div>

    <div class="botones">
      <button id="addSerie">+</button>
      <button id="descargar">Descargar</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
